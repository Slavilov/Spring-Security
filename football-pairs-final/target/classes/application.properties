spring.application.name=football-pairs-final

spring.datasource.url=jdbc:h2:mem:footballpairsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false

app.csv.import-on-startup=true
app.csv.teams-path=src/main/resources/data/teams.csv
app.csv.players-path=src/main/resources/data/players.csv
app.csv.matches-path=src/main/resources/data/matches.csv
app.csv.records-path=src/main/resources/data/records.csv
